name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        node:
          - 22
          - 24

    defaults:
      run:
        working-directory: clean-handoff

    steps:
      - name: Check out Clean Handoff
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          path: clean-handoff
          persist-credentials: false

      - name: Check out official OpenAI validators
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: openai/codex
          ref: 2c351cb8646054427e0ea81a484233114b1234f7
          path: openai-codex
          sparse-checkout: |
            codex-rs/skills/src/assets/samples/plugin-creator/scripts/validate_plugin.py
            codex-rs/skills/src/assets/samples/skill-creator/scripts/quick_validate.py
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: ${{ matrix.node }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"

      - name: Install validation dependency
        run: python -m pip install --disable-pip-version-check --requirement requirements-validation.txt

      - name: Check JavaScript syntax
        run: |
          node --check skills/clean-handoff/scripts/clean-handoff.mjs
          node --check skills/clean-handoff/scripts/internal/context-safety.mjs
          node --check skills/clean-handoff/scripts/internal/errors.mjs
          node --check skills/clean-handoff/scripts/internal/fs-safety.mjs
          node --check skills/clean-handoff/scripts/internal/minimal-handoff.mjs
          node --check skills/clean-handoff/scripts/internal/project-selection.mjs

      - name: Run standalone skill tests
        run: node --test skills/clean-handoff/tests/*.test.mjs

      - name: Run retained root regression
        if: ${{ hashFiles('clean-handoff/tests/*.test.mjs') != '' }}
        run: node --test --test-skip-pattern="^plugin packages one valid router skill$" tests/*.test.mjs

      - name: Run official skill validator
        run: python ../openai-codex/codex-rs/skills/src/assets/samples/skill-creator/scripts/quick_validate.py skills/clean-handoff

      - name: Check whitespace
        run: git diff --check
